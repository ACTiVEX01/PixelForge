<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Latest gaming news, industry updates, and breaking stories from the gaming world.">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Gaming News | PixelForge">
<meta property="og:description" content="Latest gaming news, industry updates, and breaking stories from the gaming world.">
<meta property="og:type" content="website">
<link rel="canonical" href="https://pixelforge-blog.vercel.app/category/news">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/main.css">
<title>Gaming News | PixelForge</title>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"CollectionPage","name":"Gaming News — PixelForge","url":"https://pixelforge-blog.vercel.app/category/news","description":"Latest gaming news, industry updates, and breaking stories from the gaming world."}</script>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>
<div class="bg-grid" aria-hidden="true"></div>
<main>
<div class="page-header" style="background:linear-gradient(180deg,var(--bg-secondary) 0%,transparent 100%);">
  <div class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb" style="padding-bottom:1rem;">
      <ol class="bc-list">
        <li><a href="/">Home</a></li><li><span class="bc-sep">/</span></li>
        <li><a href="/articles">Articles</a></li><li><span class="bc-sep">/</span></li>
        <li><span class="bc-current">Gaming News</span></li>
      </ol>
    </nav>
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
      <span style="font-size:3rem;">📰</span>
      <div>
        <h1><span class="grad-text">Gaming News</span></h1>
        <p style="color:var(--text-secondary);margin-top:.25rem;">Latest gaming news, industry updates, and breaking stories from the gaming world.</p>
      </div>
    </div>
  </div>
</div>
<div class="container" style="padding-bottom:5rem;">
  <div class="category-tabs" role="tablist" aria-label="Filter by category">
    <button class="tab-btn" data-category="all"         role="tab"><a href="/articles" style="color:inherit;text-decoration:none;">🎮 All</a></button>
    <button class="tab-btn" data-category="news"        role="tab"><a href="/category/news"        style="color:inherit;text-decoration:none;">📰 News</a></button>
    <button class="tab-btn" data-category="reviews"     role="tab"><a href="/category/reviews"     style="color:inherit;text-decoration:none;">⭐ Reviews</a></button>
    <button class="tab-btn" data-category="game-dev"    role="tab"><a href="/category/game-dev"    style="color:inherit;text-decoration:none;">💻 Game Dev</a></button>
    <button class="tab-btn" data-category="tutorials"   role="tab"><a href="/category/tutorials"   style="color:inherit;text-decoration:none;">📚 Tutorials</a></button>
    <button class="tab-btn" data-category="indie-games" role="tab"><a href="/category/indie-games" style="color:inherit;text-decoration:none;">🕹️ Indie</a></button>
  </div>
  <div id="postsContainer" class="blog-grid" role="feed" aria-label="Gaming News articles"></div>
  <div id="pagination" class="pagination" role="navigation" aria-label="Pagination"></div>
</div>
<section id="newsletter" class="newsletter-section" aria-labelledby="nlTitle">
  <div class="container">
    <div class="newsletter-wrap">
      <div class="newsletter-glow" aria-hidden="true"></div>
      <div style="font-size:2.5rem;margin-bottom:1rem">📨</div>
      <h2 id="nlTitle">Stay in the Game</h2>
      <p>Get the best gaming stories weekly.</p>
      <form class="newsletter-form" id="newsletterForm" novalidate>
        <input type="email" id="newsletterEmail" name="email" placeholder="your@email.com" required autocomplete="email" aria-label="Email address">
        <button type="submit">Subscribe</button>
      </form>
      <div class="newsletter-success" id="newsletterSuccess" role="alert">✅ Welcome aboard!</div>
    </div>
  </div>
</section>
</main>
<script src="/assets/js/main.js"></script>
<script src="/assets/js/shared-ui.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  state.filter = 'news';
  state.page   = 1;
  // Highlight active tab
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.category === 'news');
    b.setAttribute('aria-selected', b.dataset.category === 'news');
  });
  await loadPosts(document.getElementById('postsContainer'), false);
});
</script>
</body>
</html>
